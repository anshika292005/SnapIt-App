name: flutter_ecommerce_app
description: A Flutter e-commerce app using Firebase and Provider.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cached_network_image: ^3.4.1
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.4.0
  firebase_core: ^3.9.0
  intl: ^0.20.1
  provider: ^6.1.2
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  firebase_auth_mocks: ^0.14.2

flutter:
  uses-material-design: true
  assets:
    - assets/categories/
    - assets/products/
